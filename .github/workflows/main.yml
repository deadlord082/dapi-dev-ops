name: CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    uses: ./.github/workflows/test.yml
    needs: lint

  build:
    uses: ./.github/workflows/build.yml
    needs: test
    permissions:
      contents: read
      packages: write

  scan:
    uses: ./.github/workflows/scan.yml
    needs: build

  deploy:
    uses: ./.github/workflows/deploy.yml
    needs: scan
